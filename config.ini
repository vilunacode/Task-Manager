; Task Manager configuration
; This file is meant to be easy to edit for non-developers.
; Values from environment variables can still override these settings.

[server]
; On which IP/interface Flask should listen.
; 0.0.0.0 = reachable from network, 127.0.0.1 = local only.
host = 0.0.0.0

; Port of the web app.
port = 5000

; true/false - set false in production.
debug = true

[app]
; Change this in production.
secret_key = dev-secret-change-me

; Time zone used in date/time display.
timezone = Europe/Berlin

[database]
; Driver: sqlite, postgres, postgresql, mysql, mariadb
driver = sqlite

; Connection details (IP/Port/DB-Name/User/Password)
host = 127.0.0.1
port = 5432
name = task_manager
username =
password =

; Optional direct URL (if set, this value is preferred).
; Examples:
; sqlite:///task_manager.db
; postgresql://user:password@127.0.0.1:5432/task_manager
; mysql://user:password@127.0.0.1:3306/task_manager
url =

; Optional sqlite file path (only relevant when driver=sqlite and url is empty)
path = task_manager.db
